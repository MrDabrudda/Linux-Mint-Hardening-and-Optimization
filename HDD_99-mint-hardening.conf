# /etc/sysctl.d/99-mint-hardening.conf
# Security Hardening & Mechanical Platter/Spinning HDD Performance Optimization for Linux Mint 22.3

# ==========================================
# 🧠 MEMORY & SWAP (HDD Optimized)
# ==========================================
# Keep applications in RAM longer (critical for HDD responsiveness)
vm.swappiness = 10
# Retain file/directory cache instead of aggressively reclaiming inodes
vm.vfs_cache_pressure = 50
# Limit dirty pages before forcing synchronous writeback (prevents HDD freezes)
vm.dirty_ratio = 15
# Start background writeback earlier to spread I/O load
vm.dirty_background_ratio = 5
# Allow dirty pages to stay in cache up to 30 seconds before flush
vm.dirty_expire_centisecs = 3000

# ==========================================
# 📁 FILESYSTEM & I/O
# ==========================================
# Increase maximum open file descriptors
fs.file-max = 2097152
# Increase inotify watchers (IDEs, file managers, cloud sync, etc.)
fs.inotify.max_user_watches = 524288
fs.inotify.max_queued_events = 16384
fs.inotify.max_user_instances = 128

# ==========================================
# 🔒 NETWORK SECURITY (Hardening)
# ==========================================
# Enable SYN flood protection
net.ipv4.tcp_syncookies = 1
# Enable reverse path filtering (anti-spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
# Disable IP source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
# Disable ICMP redirects (prevent route manipulation/MITM)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
# Log martian (spoofed/routable) packets
net.ipv4.conf.all.log_martians = 1
# Ignore ICMP broadcast requests (Smurf attack mitigation)
net.ipv4.icmp_echo_ignore_broadcasts = 1
# Ignore bogus ICMP error responses

# ==========================================
# 🌐 NETWORK PERFORMANCE & TUNING
# ==========================================
# CUBIC congestion control (optimal for desktop/broadband/HDD)
net.ipv4.tcp_congestion_control = cubic
# Fair Queueing for lower latency under mixed traffic
net.core.default_qdisc = fq
# Enable TCP Fast Open (reduces latency for repeated connections)
net.ipv4.tcp_fastopen = 3
# Safely reuse TIME_WAIT sockets
net.ipv4.tcp_tw_reuse = 1
# Optimize TCP keepalive behavior
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_keepalive_intvl = 15
# Reduce FIN_WAIT timeout
net.ipv4.tcp_fin_timeout = 15
# Enable MTU probing (helps with packet loss/black holes)
net.ipv4.tcp_mtu_probing = 1
# Increase connection backlog limits
net.ipv4.tcp_max_syn_backlog = 2048
net.core.somaxconn = 4096

# ==========================================
# 🌍 IPv6 (Secure but Functional)
# ==========================================
# Hardened but left enabled to prevent app timeouts/delays
# (If you truly don't use IPv6, block it at router/UFW level instead)
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# ==========================================
# ⚙️ KERNEL & SECURITY MISC
# ==========================================
# Increase PID limit
kernel.pid_max = 4194304
# Restrict kernel pointer exposure (security)
kernel.kptr_restrict = 1
# Disable core dumps for SUID binaries (security)
fs.suid_dumpable = 0
# Restrict ptrace to direct children only (prevents debugging exploits)
kernel.yama.ptrace_scope = 1