# /etc/sysctl.d/99-mint-hardening.conf
# Security Hardening & SSD Performance Optimization for Linux Mint 22.3
# Apply with: sudo sysctl --system

# 1. Create/overwrite the file
#sudo nano /etc/sysctl.d/99-mint-hardening.conf
# (Paste the full block below)

# 2. Apply immediately
#sudo sysctl --system

# 3. Verify key parameters
#sysctl vm.swappiness vm.dirty_ratio vm.vfs_cache_pressure net.ipv4.tcp_congestion_control net.core.default_qdisc


# ==========================================
# 🧠 MEMORY & SWAP (SSD Optimized)
# ==========================================
# Keep active apps/data in RAM; SSD swap is fast but still slower than RAM
vm.swappiness = 10
# Retain directory/inode cache longer for snappy file browsing & app launches
vm.vfs_cache_pressure = 50
# Higher dirty ratio allows more write batching → reduces SSD write amplification
vm.dirty_ratio = 20
# Start background flushes at 10% to prevent sudden latency spikes
vm.dirty_background_ratio = 10
# Allow dirty pages to sit in RAM up to 50s before forced writeback
vm.dirty_expire_centisecs = 5000

# ==========================================
# 📁 FILESYSTEM & I/O
# ==========================================
fs.file-max = 2097152
fs.inotify.max_user_watches = 524288
fs.inotify.max_queued_events = 16384
fs.inotify.max_user_instances = 128

# ==========================================
# 🔒 NETWORK SECURITY (Hardening)
# ==========================================
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.log_martians = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1
# Note: net.ipv4.icmp_ignore_bogus_error_responses is kernel-enforced (read-only)

# ==========================================
# 🌐 NETWORK PERFORMANCE & TUNING
# ==========================================
net.ipv4.tcp_congestion_control = cubic
net.core.default_qdisc = fq
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.core.somaxconn = 4096

# ==========================================
# 🌍 IPv6 (Secure but Functional)
# ==========================================
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# ==========================================
# ⚙️ KERNEL & SECURITY MISC
# ==========================================
kernel.pid_max = 4194304
kernel.kptr_restrict = 1
fs.suid_dumpable = 0
kernel.yama.ptrace_scope = 1